version: '3.8'

services:
  hr-backend:
    image: ${BACKEND_IMAGE}
    container_name: hr-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    networks:
      - hr-net

  hr-frontend:
    image: ${FRONTEND_IMAGE}
    container_name: hr-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    networks:
      - hr-net

networks:
  hr-net:
    driver: bridge
